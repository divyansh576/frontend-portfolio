<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desktop Pokédex</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="pokedex">

<div class="left-panel">

<h1>Pokédex</h1>

<input id="search" placeholder="Search Pokémon...">

<ul id="pokemon-list"></ul>

</div>

<div class="right-panel">

<div class="screen">

<img id="pokemon-img">

<h2 id="pokemon-name">Select a Pokémon</h2>

<p id="pokemon-types"></p>

<div id="stats"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
